name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - debug
          - release
        default: 'debug'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install client dependencies
      run: |
        cd client
        npm ci

    - name: Prebuild native code
      run: |
        cd client
        npx expo prebuild --clean --platform android

    - name: Build APK
      env:
        BUILD_TYPE: ${{ github.event.inputs.build_type || 'debug' }}
      run: |
        cd client/android
        if [ "$BUILD_TYPE" = "release" ]; then
          ./gradlew assembleRelease
          APK_PATH=app/build/outputs/apk/release/app-release.apk
        else
          ./gradlew assembleDebug
          APK_PATH=app/build/outputs/apk/debug/app-debug.apk
        fi
        echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ github.event.inputs.build_type || 'debug' }}-apk
        path: client/android/app/build/outputs/apk/**/*.apk
        retention-days: 30

    - name: Create Release Summary
      if: success()
      run: |
        echo "## ✅ APK 构建成功！" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📱 下载方式" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "1. 点击下方的 Artifacts 区域" >> $GITHUB_STEP_SUMMARY
        echo "2. 下载 \`app-${{ github.event.inputs.build_type || 'debug' }}-apk\`" >> $GITHUB_STEP_SUMMARY
        echo "3. 解压后安装 APK 到 Android 设备" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 构建信息" >> $GITHUB_STEP_SUMMARY
        echo "- **构建类型**: ${{ github.event.inputs.build_type || 'debug' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **分支**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
