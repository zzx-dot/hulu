name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install client dependencies
        run: |
          cd client
          npm install

      - name: Prebuild native code
        run: |
          cd client
          npx expo prebuild --clean --platform android

      - name: Fix Android build config
        run: |
          cd client/android
          # 启用 MultiDex
          sed -i 's/multiDexEnabled false/multiDexEnabled true/g' app/build.gradle
          sed -i '/multiDexEnabled/a\        minSdkVersion 24' app/build.gradle
          # 增加 Gradle 内存
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g" >> gradle.properties
          # 添加 multidex 依赖
          sed -i '/dependencies {/a\    implementation "androidx.multidex:multidex:2.0.1"' app/build.gradle

      - name: Grant execute permission for gradlew
        run: chmod +x client/android/gradlew

      - name: Build Release APK
        run: |
          cd client/android
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: huluwa-release-apk
          path: client/android/app/build/outputs/apk/release/*.apk
          retention-days: 30